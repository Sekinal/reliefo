# Córdoba — generated by scripts/veracruz_batch.py (importance order #1)
[paths]
data = "../data/cordoba"
out  = "../output"

[map]
name     = "Córdoba"
slug     = "cordoba"
title    = "CÓRDOBA"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.01359, south = 18.82666, east = -96.86335, north = 19.02131 }

[boundary]
file = "../data/boundaries/cordoba_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true

[labels]
enabled   = true
source    = "denue"
cvemun    = "044"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

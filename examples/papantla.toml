# Papantla — generated by scripts/veracruz_batch.py (importance order #9)
[paths]
data = "../data/papantla"
out  = "../output"

[map]
name     = "Papantla"
slug     = "papantla"
title    = "PAPANTLA"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.47454, south = 20.24736, east = -97.13454, north = 20.58736 }

[boundary]
file = "../data/boundaries/papantla_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true
osm_file = "../data/mexico.osm.pbf"

[labels]
enabled   = true
source    = "denue"
cvemun    = "124"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

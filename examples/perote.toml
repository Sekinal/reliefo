# Perote — generated by scripts/veracruz_batch.py (importance order #12)
[paths]
data = "../data/perote"
out  = "../output"

[map]
name     = "Perote"
slug     = "perote"
title    = "PEROTE"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.43653, south = 19.35975, east = -97.09653, north = 19.6619 }

[boundary]
file = "../data/boundaries/perote_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette      = "oslo"

[render]
resolution = 4000
samples    = 160

# Poza Rica — generated by scripts/veracruz_batch.py (importance order #4)
[paths]
data = "../data/poza_rica"
out  = "../output"

[map]
name     = "Poza Rica"
slug     = "poza_rica"
title    = "POZA RICA"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.49541, south = 20.47545, east = -97.38561, north = 20.59988 }

[boundary]
file = "../data/boundaries/poza_rica_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true

[labels]
enabled   = true
source    = "denue"
cvemun    = "131"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

# Catemaco — generated by scripts/veracruz_batch.py (importance order #12)
[paths]
data = "../data/catemaco"
out  = "../output"

[map]
name     = "Catemaco"
slug     = "catemaco"
title    = "CATEMACO"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -95.18159, south = 18.2654, east = -94.84602, north = 18.6054 }

[boundary]
file = "../data/boundaries/catemaco_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true
osm_file = "../data/mexico.osm.pbf"

[labels]
enabled   = true
source    = "denue"
cvemun    = "032"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

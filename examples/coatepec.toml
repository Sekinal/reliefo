# Coatepec — generated by scripts/veracruz_batch.py (importance order #11)
[paths]
data = "../data/coatepec"
out  = "../output"

[map]
name     = "Coatepec"
slug     = "coatepec"
title    = "COATEPEC"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.12163, south = 19.34677, east = -96.78163, north = 19.5429 }

[boundary]
file = "../data/boundaries/coatepec_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette      = "oslo"

[render]
resolution = 4000
samples    = 160

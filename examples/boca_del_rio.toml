# Boca del Río — generated by scripts/veracruz_batch.py (importance order #5)
[paths]
data = "../data/boca_del_rio"
out  = "../output"

[map]
name     = "Boca del Río"
slug     = "boca_del_rio"
title    = "BOCA DEL RÍO"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -96.15966, south = 19.04431, east = -96.08277, north = 19.18174 }

[boundary]
file = "../data/boundaries/boca_del_rio_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true
osm_file = "../data/mexico.osm.pbf"

[labels]
enabled   = true
source    = "denue"
cvemun    = "028"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

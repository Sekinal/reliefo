# Minatitlán — generated by scripts/veracruz_batch.py (importance order #6)
[paths]
data = "../data/minatitlan"
out  = "../output"

[map]
name     = "Minatitlán"
slug     = "minatitlan"
title    = "MINATITLÁN"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -94.56023, south = 17.53549, east = -94.22023, north = 17.87549 }

[boundary]
file = "../data/boundaries/minatitlan_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true

[labels]
enabled   = true
source    = "denue"
cvemun    = "108"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

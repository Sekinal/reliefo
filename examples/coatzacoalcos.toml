# Coatzacoalcos — generated by scripts/veracruz_batch.py (importance order #3)
[paths]
data = "../data/coatzacoalcos"
out  = "../output"

[map]
name     = "Coatzacoalcos"
slug     = "coatzacoalcos"
title    = "COATZACOALCOS"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -94.60124, south = 18.05098, east = -94.26124, north = 18.22235 }

[boundary]
file = "../data/boundaries/coatzacoalcos_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true
osm_file = "../data/mexico.osm.pbf"

[labels]
enabled   = true
source    = "denue"
cvemun    = "039"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

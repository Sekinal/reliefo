# Tuxpan — generated by scripts/veracruz_batch.py (importance order #7)
[paths]
data = "../data/tuxpan"
out  = "../output"

[map]
name     = "Tuxpan"
slug     = "tuxpan"
title    = "TUXPAN"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.44848, south = 20.9146, east = -97.36569, north = 20.99924 }

[boundary]
file = "../data/boundaries/tuxpan_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true

[labels]
enabled   = true
source    = "denue"
cvemun    = "189"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

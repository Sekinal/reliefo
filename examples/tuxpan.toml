# Tuxpan — generated by scripts/veracruz_batch.py (importance order #8)
[paths]
data = "../data/tuxpan"
out  = "../output"

[map]
name     = "Tuxpan"
slug     = "tuxpan"
title    = "TUXPAN"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.44848, south = 20.9146, east = -97.36569, north = 20.99924 }

[boundary]
file = "../data/boundaries/tuxpan_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette      = "oslo"

[render]
resolution = 4000
samples    = 160

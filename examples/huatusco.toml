# Huatusco — generated by scripts/veracruz_batch.py (importance order #13)
[paths]
data = "../data/huatusco"
out  = "../output"

[map]
name     = "Huatusco"
slug     = "huatusco"
title    = "HUATUSCO"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.04006, south = 19.06251, east = -96.70006, north = 19.22866 }

[boundary]
file = "../data/boundaries/huatusco_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true
osm_file = "../data/mexico.osm.pbf"

[labels]
enabled   = true
source    = "denue"
cvemun    = "071"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

# Xico — generated by scripts/veracruz_batch.py (importance order #15)
[paths]
data = "../data/xico"
out  = "../output"

[map]
name     = "Xico"
slug     = "xico"
title    = "XICO"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.16707, south = 19.35861, east = -96.87936, north = 19.53304 }

[boundary]
file = "../data/boundaries/xico_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette = "oslo"

[streets]
enabled  = true
osm_file = "../data/mexico.osm.pbf"

[labels]
enabled   = true
source    = "denue"
cvemun    = "092"
denue_csv = "/home/ieqr/Desktop/research/denue_xalapa/data/conjunto_de_datos/denue_inegi_30_.csv"

[render]
resolution = 4000
samples    = 160

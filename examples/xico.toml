# Xico — generated by scripts/veracruz_batch.py (importance order #16)
[paths]
data = "../data/xico"
out  = "../output"

[map]
name     = "Xico"
slug     = "xico"
title    = "XICO"
subtitle = "VERACRUZ · MÉXICO"
bbox     = { west = -97.16707, south = 19.35861, east = -96.87936, north = 19.53304 }

[boundary]
file = "../data/boundaries/xico_mun.geojson"

[dem]
source = "lidar"      # INEGI 5 m terrain; charts auto-discovered from the bbox
res_m  = 5

[relief]
palette      = "oslo"

[render]
resolution = 4000
samples    = 160
